# Render Blueprint (optional): PDF Web Service only.
# Adjust the service name and plan before deploy. The CRA app is deployed separately (e.g. Vercel).
#
# Docker paths below assume the service Root Directory is the REPO ROOT (empty in the dashboard).
# If you set Root Directory to "server", use dockerfilePath: ./Dockerfile and dockerContext: . instead
# (otherwise Render resolves server/server and the build fails).

services:
  - type: web
    name: nm-zwds-pdf-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_PDF_ORIGIN
        sync: false
      - key: ALLOWED_APP_ORIGIN
        sync: false
      - key: ALLOWED_APP_ORIGINS
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: PDF_API_SECRET
        sync: false
